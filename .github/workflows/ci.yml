name: CI

on:
  push:
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Installed against constraints.txt so CI resolves the same dependency
      # versions on every run — an upstream release cannot silently change
      # what a build tests. Pins move by reviewed Dependabot PR.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" -c constraints.txt

      - name: Run tests (excluding live_api) with coverage
        run: >-
          pytest -m "not live_api" --cov=agent_eval
          --cov-report=term-missing --cov-fail-under=90

      - name: Adversarial self-evaluation of the verifier
        run: python scripts/adversarial_eval.py

      - name: Check formatting with black
        run: black --check .

      - name: Lint with flake8
        run: flake8 .

      - name: Type-check with mypy
        run: mypy

  # Known-vulnerability audit of the resolved dependency set. Runs on one
  # Python version (the audit is about package versions, not interpreters).
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . -c constraints.txt
          pip install pip-audit

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit

  # Internal documentation links (including anchors) must resolve. The docs
  # cross-reference the ADRs heavily, and a reference that no longer points at
  # its evidence is treated the same way as a failing check: a red build.
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal documentation links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --include-fragments
            --no-progress
            "**/*.md"
          fail: true
